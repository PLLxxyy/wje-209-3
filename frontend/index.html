<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>饭搭子组局</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #FF6B35;
      --primary-light: #FF8A5C;
      --primary-dark: #E55A2B;
      --bg: #F5F0EB;
      --card: #FFFFFF;
      --text: #2D2D2D;
      --text-secondary: #7A7A7A;
      --border: #E8E0D8;
      --success: #4CAF50;
      --warning: #FF9800;
      --danger: #F44336;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ========== Layout ========== */
    .app-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(255,107,53,0.3);
    }

    .app-header .logo {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .app-header .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-header .nav-link {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
      background: none;
    }

    .app-header .nav-link:hover { background: rgba(255,255,255,0.15); }
    .app-header .nav-link.active { background: rgba(255,255,255,0.25); font-weight: 600; }

    .app-content {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ========== Auth Pages ========== */
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 24px;
    }

    .auth-card {
      background: var(--card);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .auth-card h2 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .auth-card .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .auth-card .switch-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-card .switch-link a {
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }

    /* ========== Form Elements ========== */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      font-family: inherit;
      background: #FAFAFA;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: #E8E0D8;
      color: var(--text);
    }

    .btn-secondary:hover { background: #D9CFC5; }

    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { opacity: 0.9; }

    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { opacity: 0.9; }

    .btn-sm { padding: 6px 16px; font-size: 13px; }
    .btn-block { width: 100%; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ========== Cards ========== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .meetup-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }

    .meetup-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }

    .meetup-card .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .meetup-card .card-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
      margin-right: 12px;
    }

    .meetup-card .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .meetup-card .card-meta .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meetup-card .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meetup-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .meetup-card .participants-info {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .meetup-card .participants-info strong {
      color: var(--primary);
    }

    /* ========== Tags / Badges ========== */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag-type {
      background: #FFF3E0;
      color: #E65100;
    }

    .tag-open {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .tag-full {
      background: #FFEBEE;
      color: #C62828;
    }

    .tag-settled {
      background: #E3F2FD;
      color: #1565C0;
    }

    .tag-cancelled {
      background: #F5F5F5;
      color: #757575;
    }

    /* ========== Grid ========== */
    .meetup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }

    .filter-bar .search-input {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
    }

    .filter-bar .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .filter-bar select {
      padding: 9px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      cursor: pointer;
    }

    .filter-bar select:focus { outline: none; border-color: var(--primary); }

    /* ========== Detail Page ========== */
    .detail-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .detail-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    .detail-header h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .detail-info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-info-item .info-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .detail-info-item .info-value {
      font-size: 16px;
      font-weight: 600;
    }

    .participants-section h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .participant-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #FAF7F4;
      border-radius: 8px;
      font-size: 14px;
    }

    .participant-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary-light);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .payment-confirmed {
      color: var(--success);
      font-weight: 600;
      font-size: 12px;
    }

    .payment-unconfirmed {
      color: var(--warning);
      font-size: 12px;
    }

    /* ========== Expense Section ========== */
    .expense-section {
      background: #FFF9F0;
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
    }

    .expense-section h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .expense-amount {
      font-size: 36px;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin: 16px 0;
    }

    .expense-breakdown {
      text-align: center;
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* ========== Profile Page ========== */
    .profile-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .profile-header .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .profile-header .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-header .profile-username {
      font-size: 14px;
      opacity: 0.85;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .profile-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: #E8E0D8;
      padding: 4px;
      border-radius: 10px;
    }

    .profile-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border: none;
      background: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: inherit;
    }

    .profile-tab.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ========== Page Title ========== */
    .page-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title .title-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ========== Toast ========== */
    .toast-container {
      position: fixed;
      top: 72px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: slideIn 0.3s ease;
    }

    .toast-error { background: var(--danger); }
    .toast-success { background: var(--success); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ========== Empty State ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state .empty-text {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty-state .empty-sub {
      font-size: 14px;
      color: #aaa;
    }

    /* ========== Progress Bar ========== */
    .progress-bar {
      height: 6px;
      background: #E8E0D8;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ========== Loading ========== */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-secondary);
    }

    /* ========== Back Button ========== */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 16px;
      padding: 6px 0;
      border: none;
      background: none;
      font-family: inherit;
    }

    .back-btn:hover { color: var(--primary); }

    /* ========== Responsive ========== */
    @media (max-width: 640px) {
      .app-content { padding: 16px 12px; }
      .meetup-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .detail-info-grid { grid-template-columns: 1fr 1fr; }
      .filter-bar { flex-direction: column; }
      .filter-bar .search-input { min-width: unset; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
